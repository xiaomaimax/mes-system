name: MaxMES CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境 (staging/production)'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      branch:
        description: '部署分支'
        required: true
        default: 'main'

env:
  NODE_VERSION: '20'

jobs:
  # CI: 测试和构建
  ci:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run linting
      run: npm run lint || true
    
    - name: Run tests
      run: npm test || true
    
    - name: Build application
      run: npm run build
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build
        path: client/build/

  # UAT: 自动化测试
  uat:
    needs: ci
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Start development server
      run: |
        npm run dev &
        sleep 30
    
    - name: Run UAT Stage 1
      run: bash scripts/maxmes-uat-test.sh
    
    - name: Run UAT Stage 2
      run: bash scripts/maxmes-uat-stage2.sh
    
    - name: Run UAT Stage 3
      run: bash scripts/maxmes-uat-stage3.sh
    
    - name: Run UAT Stage 4
      run: bash scripts/maxmes-uat-stage4.sh
    
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: uat-results
        path: tests/maxmes-uat/

  # 部署到预发布环境
  deploy-staging:
    needs: [ci, uat]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment: staging
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Deploy to staging via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.STAGING_HOST }}
        username: ${{ secrets.STAGING_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd /opt/mes-system
          bash scripts/auto-deploy.sh staging develop
    
    - name: Health check
      uses: appleboy/ssh-action@v1.0.3
      if: always()
      with:
        host: ${{ secrets.STAGING_HOST }}
        username: ${{ secrets.STAGING_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          bash scripts/health-check.sh

  # 部署到生产环境
  deploy-production:
    needs: [ci, uat]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Deploy to production via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd /opt/mes-system
          bash scripts/auto-deploy.sh production main
    
    - name: Health check
      uses: appleboy/ssh-action@v1.0.3
      if: always()
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          bash scripts/health-check.sh
