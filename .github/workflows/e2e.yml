name: E2E

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm ci
      - run: |
          cd client
          rm -f package-lock.json
          npm install --legacy-peer-deps react-scripts@4.0.3 babel-jest@27.5.1 @babel/core@7.17.9 @babel/preset-env@7.16.11 @babel/preset-react@7.16.7
        # react-scripts needs babel-jest and babel presets as peer deps

      - run: npx playwright install --with-deps chromium

      - name: Build client
        run: npm run build
        working-directory: ./client

      - name: Run E2E tests
        run: npx playwright test --reporter=list
        working-directory: ./e2e

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 3
