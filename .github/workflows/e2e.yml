name: E2E

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm ci
      - run: rm -f client/package-lock.json && cd client && npm install --legacy-peer-deps react-scripts@4.0.3
      - run: npx playwright install --with-deps chromium

      - name: Build client
        run: npm run build

      - name: Run E2E tests
        run: npx playwright test --reporter=list
        working-directory: /opt/mes-system/e2e

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 3
