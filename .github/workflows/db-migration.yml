name: MaxMES Database Migration
on:
  push:
    branches: [ main, develop ]
    paths: 
      - 'migrations/**'
      - 'scripts/**'
      - 'server/models/**'
      - 'package.json'

jobs:
  migrate-test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: maxmes_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run database migrations on test DB
      run: npm run setup-db
      env:
        DB_HOST: localhost
        DB_PORT: 3306
        DB_USER: root
        DB_PASSWORD: rootpassword
        DB_NAME: maxmes_test
        NODE_ENV: test

  migrate-staging:
    needs: migrate-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment: staging-db
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run database migrations on staging
      run: |
        # 这里添加连接到预发布数据库并执行迁移的步骤
        echo "Running database migrations on staging environment"
        # 示例：npx sequelize-cli db:migrate --env staging

  migrate-production:
    needs: [migrate-test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production-db
    permissions:
      id-token: write
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run database migrations on production
      run: |
        # 这里添加连接到生产数据库并执行迁移的步骤
        echo "Running database migrations on production environment"
        # 示例：npx sequelize-cli db:migrate --env production